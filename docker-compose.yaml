name: retailflow

services:
  kafka-1:
    image: bitnami/kafka:3.9
    hostname: kafka-1
    ports:
      - "29092:29092"
    volumes:
      - "kafka_data_1:/bitnami"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_KRAFT_CLUSTER_ID=xYN3lhaZR8qtJRUalXzIgQ
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:19092,2@kafka-2:19092
      - KAFKA_BROKER_ID=1

      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,CONTROLLER://:19092,EXTERNAL://:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      # - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-1:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-1:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_NUM_PARTITIONS=2
      - KAFKA_CFG_NODE_ID=1
      - ALLOW_PLAINTEXT_LISTENER=yes
      - BITNAMI_DEBUG=yes
    networks:
      - retailflow 

  kafka-2:
    image: bitnami/kafka:3.9
    hostname: kafka-2
    ports:
      - "29093:29093"
    volumes:
      - "kafka_data_2:/bitnami"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_KRAFT_CLUSTER_ID=xYN3lhaZR8qtJRUalXzIgQ
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:19092,2@kafka-2:19092
      - KAFKA_BROKER_ID=2

      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,CONTROLLER://:19092,EXTERNAL://:29093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      # - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-2:9092,EXTERNAL://localhost:29093
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-2:9092,EXTERNAL://localhost:29093
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_NUM_PARTITIONS=2
      - KAFKA_CFG_NODE_ID=2
      - ALLOW_PLAINTEXT_LISTENER=yes
      - BITNAMI_DEBUG=yes
    networks:
      - retailflow 

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - 8081:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: docker-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092

      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks:
      - retailflow

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.3
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      - kafka-1
      - kafka-2
    ports:
      - "8082:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-1:9092,PLAINTEXT://kafka-2:9092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailflow

  alpha-db:
    image: postgres:17.5-alpine3.22
    container_name: alpha-postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=alpha
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=alpha_db
    volumes:
      - alpha_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  kafka_data_1:
    driver: local
  kafka_data_2:
    driver: local
  alpha_pg_data:
    driver: local

networks:
  retailflow:
    external: true
    name: retailflow